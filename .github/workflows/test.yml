name: SahiDawa CI / Test Suite

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]
    workflow_dispatch:

jobs:
    test-node-apps:
        name: 🧪 Build & Test Node.js Apps (Web & API)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        services:
            redis:
                image: redis:alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - name: ⬇️ Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: ⚙️ Setup Node.js from .nvmrc
              uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: "npm"

            - name: 📦 Upgrade npm
              run: npm install -g npm@10

            - name: 📦 Install Dependencies (Monorepo)
              run: npm install --legacy-peer-deps
            
            - name: ⚡ Cache Turborepo
              uses: actions/cache@v4
              id: turbo-cache
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-${{ github.ref_name }}-
                      ${{ runner.os }}-turbo-main-
                      ${{ runner.os }}-turbo-

            - name: ⚡ Cache Next.js Build
              uses: actions/cache@v4
              id: nextjs-cache
              with:
                  path: apps/web/.next/cache
                  key: ${{ runner.os }}-nextjs-${{ github.ref_name }}-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-${{ github.ref_name }}-
                      ${{ runner.os }}-nextjs-main-
                      ${{ runner.os }}-nextjs-

            - name: 📊 Report Cache Status
              run: |
                  echo "### ⚡ Cache Status" >> $GITHUB_STEP_SUMMARY
                  echo "| Cache | Status |" >> $GITHUB_STEP_SUMMARY
                  echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
                  echo "| Turborepo | ${{ steps.turbo-cache.outputs.cache-hit == 'true' && '✅ Hit' || '❌ Miss' }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| Next.js   | ${{ steps.nextjs-cache.outputs.cache-hit == 'true' && '✅ Hit' || '❌ Miss' }} |" >> $GITHUB_STEP_SUMMARY

            - name: 🏗️ Build Workspace Apps
              run: npm run build
              env:
                  TURBO_CACHE_DIR: .turbo
                  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
                  NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key

            - name: 🧪 Run Tests
              run: npm run test -- --forceExit

