name: 💤 Auto Warn & Unassign Inactive Issues

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  auto-unassign:
    runs-on: ubuntu-latest
    steps:
      - name: Auto warn and unassign inactive contributors
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const memoizedCollaborators = new Map();
            async function isMaintainer(username) {
              if (!username) return false;
              if (memoizedCollaborators.has(username)) {
                return memoizedCollaborators.get(username);
              }
              try {
                const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner, repo, username
                });
                const isM = perm.permission === 'admin' || perm.permission === 'write';
                memoizedCollaborators.set(username, isM);
                return isM;
              } catch (err) {
                return false;
              }
            }

            // ─────────────────────────────────────────────
            // Config & Rules Based on Labels
            // ─────────────────────────────────────────────
            function getRulesForIssue(labels) {
              const labelNames = labels.map(l => (typeof l === 'string' ? l : l.name).toLowerCase());
              
              if (labelNames.includes('good first issue')) {
                return { maxDays: 2, warnDays: 1 }; // Unassign after 2 days (48h), Warn after 1 day (24h)
              }
              if (labelNames.includes('advanced') || labelNames.includes('ml') || labelNames.includes('agent')) {
                return { maxDays: 4, warnDays: 3 }; // Unassign after 4 days (96h), Warn after 3 days (72h)
              }
              if (labelNames.includes('intermediate')) {
                return { maxDays: 3, warnDays: 2 }; // Unassign after 3 days (72h), Warn after 2 days (48h)
              }
              return { maxDays: 3, warnDays: 2 }; // Default Fallback (72h unassign, 48h warn)
            }

            core.info(`Fetching open issues...`);
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            // Fetch open pull requests to check for linked PRs (including drafts)
            core.info(`Fetching open pull requests...`);
            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            for (const issue of issues) {
              try {
                // Skip PRs (Issues API returns PRs too)
                if (issue.pull_request) {
                  continue;
                }
                
                const assignees = (issue.assignees || []).map(a => a.login);
                if (assignees.length === 0) {
                  continue;
                }

                core.info(`\nChecking issue #${issue.number}`);

                const rules = getRulesForIssue(issue.labels || []);
                const now = new Date();
                const unassignCutoff = new Date(now.getTime() - rules.maxDays * 24 * 60 * 60 * 1000);
                const warnCutoff = new Date(now.getTime() - rules.warnDays * 24 * 60 * 60 * 1000);

                // ─────────────────────────────────────────────
                // Fetch timeline/comments/events
                // ─────────────────────────────────────────────
                const events = await github.paginate(github.rest.issues.listEvents, {
                  owner, repo, issue_number: issue.number, per_page: 100
                });
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner, repo, issue_number: issue.number, per_page: 100
                });

                for (const assignee of assignees) {
                  // Find when this user was assigned
                  const assignedEvent = events
                    .filter(e => e.event === 'assigned' && e.assignee && e.assignee.login === assignee)
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

                  if (!assignedEvent) continue;

                  const assignedAt = new Date(assignedEvent.created_at);

                  if (assignedAt > warnCutoff) {
                    core.info(`Skipping ${assignee} on #${issue.number} (recently assigned, < ${rules.warnDays} days ago)`);
                    continue;
                  }

                  // ─────────────────────────────────────────────
                  // Check contributor activity & Linked PRs
                  // ─────────────────────────────────────────────
                  const linkedPR = prs.find(pr => {
                    if (!pr.user || pr.user.login !== assignee) return false;
                    const body = pr.body || '';
                    const title = pr.title || '';
                    const issueRefRegex = new RegExp('(?:#|issues/)' + issue.number + '\\b', 'i');
                    return issueRefRegex.test(body) || issueRefRegex.test(title);
                  });

                  if (linkedPR) {
                    core.info(`${assignee} has an open linked PR (#${linkedPR.number}) for issue #${issue.number}. Skipping.`);
                    continue;
                  }

                  const contributorComments = comments.filter(c => 
                    c.user && c.user.login === assignee && new Date(c.created_at) > assignedAt
                  );

                  let lastActivityAt = assignedAt;
                  if (contributorComments.length > 0) {
                    const sortedComments = contributorComments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    const lastCommentAt = new Date(sortedComments[0].created_at);
                    if (lastCommentAt > lastActivityAt) {
                      lastActivityAt = lastCommentAt;
                    }
                  }

                  if (lastActivityAt > warnCutoff) {
                    core.info(`Skipping ${assignee} on #${issue.number} (active recently, last activity at ${lastActivityAt.toUTCString()})`);
                    continue;
                  }

                  // ─────────────────────────────────────────────
                  // Auto-unassign or Warn
                  // ─────────────────────────────────────────────
                  if (lastActivityAt <= unassignCutoff) {
                    // UNASSIGN
                    core.info(`Unassigning ${assignee} from #${issue.number} (No activity since ${lastActivityAt.toUTCString()} - over ${rules.maxDays} days)`);
                    await github.rest.issues.removeAssignees({
                      owner, repo, issue_number: issue.number, assignees: [assignee]
                    });
                    // NEW: Add 'status: open-for-all' label so others can claim it
                    try {
                      await github.rest.issues.addLabels({
                        owner, repo, issue_number: issue.number, labels: ['status: open-for-all']
                      });
                    } catch (labelErr) {
                      core.warning(`Failed to add open-for-all label: ${labelErr.message}`);
                    }
                    
                    // CLEAR PREVIOUS COMMENTS to make issue look clean and 'new'
                    const commentsToDelete = [];
                    for (const c of comments) {
                      if (!c.user) continue;
                      const commenter = c.user.login;
                      const isBot = commenter === 'github-actions[bot]' || c.user.type === 'Bot';
                      
                      if (isBot) {
                        commentsToDelete.push(c);
                        continue;
                      }
                      if (commenter === assignee) {
                        commentsToDelete.push(c);
                        continue;
                      }
                      
                      const cBody = c.body || '';
                      const isAssignRequest = cBody.toLowerCase().includes('/assign') || 
                                              cBody.toLowerCase().includes('please assign') || 
                                              cBody.toLowerCase().includes('assign me') ||
                                              cBody.toLowerCase().includes('claim');

                      if (isAssignRequest) {
                        commentsToDelete.push(c);
                        continue;
                      }

                      // Check if commenter is a maintainer
                      const isM = await isMaintainer(commenter);
                      if (isM) {
                        // Keep maintainer comments
                        continue;
                      }

                      // Check if commenter is the issue author
                      const isIssueAuthor = commenter === issue.user.login;
                      if (isIssueAuthor) {
                        // Keep issue author comments (unless they were assignment requests, which we already filtered above)
                        continue;
                      }

                      // Delete all other comments to keep it clean
                      commentsToDelete.push(c);
                    }
                    
                    for (const comment of commentsToDelete) {
                      try {
                        await github.rest.issues.deleteComment({
                          owner, repo, comment_id: comment.id
                        });
                        core.info(`Deleted old comment ${comment.id} to clean up the thread`);
                      } catch (delErr) {
                        core.warning(`Failed to delete comment ${comment.id}: ${delErr.message}`);
                      }
                    }

                    try {
                      await github.rest.issues.createComment({
                        owner, repo, issue_number: issue.number,
                        body: `@${assignee} has been auto-unassigned due to inactivity for over ${rules.maxDays} days.\n\n` +
                              `If you would still like to work on this, please drop a comment to be reassigned.`
                      });
                    } catch (commentErr) {
                      core.warning(`Failed to post unassign comment on #${issue.number}: ${commentErr.message}`);
                    }
                  } else if (lastActivityAt <= warnCutoff) {
                    // WARN
                    const warningMarker = `Reminder: @${assignee}`;
                    const alreadyWarned = comments.some(c => 
                      c.user && 
                      c.user.login === 'github-actions[bot]' && 
                      c.body.includes(warningMarker) &&
                      new Date(c.created_at) > lastActivityAt
                    );
                    
                    if (!alreadyWarned) {
                      core.info(`Warning ${assignee} on #${issue.number} (Approaching unassign cutoff)`);
                      const hoursLeft = Math.max(0, Math.round((lastActivityAt.getTime() + rules.maxDays * 24 * 60 * 60 * 1000 - now.getTime()) / (60 * 60 * 1000)));
                      try {
                        await github.rest.issues.createComment({
                          owner, repo, issue_number: issue.number,
                          body: `${warningMarker}\n\n` +
                                `There has been no activity on this issue since ${lastActivityAt.toUTCString()}.\n` +
                                `Please share a progress update or open a Draft PR within the next ${hoursLeft} hours to keep your assignment. ` +
                                `Otherwise, you will be automatically unassigned.`
                        });
                      } catch (commentErr) {
                        core.warning(`Failed to post warn comment on #${issue.number}: ${commentErr.message}`);
                      }
                    } else {
                      core.info(`Already warned ${assignee} on #${issue.number} since their last activity, waiting for unassign cutoff.`);
                    }
                  }
                }
              } catch (issueErr) {
                core.error(`Failed to process issue #${issue.number}: ${issueErr.message}`);
              }
            }
            core.info('Finished inactivity sweep.');
